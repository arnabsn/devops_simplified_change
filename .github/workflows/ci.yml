name: CI/CD

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: echo "Building..."

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm test

  sonar:
    name: Sonar Analysis
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          args: >
            -Dsonar.organization=test_org_arnab
            -Dsonar.projectKey=devops-change-action

  change:
    name: DevOps Change Gate
    runs-on: ubuntu-latest
    needs: sonar
    steps:
      - uses: actions/checkout@v4
      - uses: ./
        with:
          sn-instance: ${{ secrets.SN_INSTANCE }}
          sn-username: ${{ secrets.SN_USERNAME }}
          sn-password: ${{ secrets.SN_PASSWORD }}
          ci: devops-change-action
          artifacts: '[{"name":"devops-change-action","version":"${{ github.sha }}"}]'
          sonar-project-key: devops-change-action
          sonar-host-url: https://sonarcloud.io
          sonar-token: ${{ secrets.SONAR_TOKEN }}
          github-token: ${{ github.token }}

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: change
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to production
        run: echo "Deploying ${{ github.sha }} to production"
